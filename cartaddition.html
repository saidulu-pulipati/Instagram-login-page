<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <button onclick="showcart()">show cart</button>
        <button onclick="addtocart()">add to cart</button>
        <button onclick="addtocarttwo()">+2</button>
        <button onclick="addtocartthree()">+3</button>
        <button onclick="resetcart()">reset cart</button>
        <br>
        <br>
        <div style="background-color: rgba(0, 255, 255, 0.397); width:fit-content; border-radius: 10px; padding: 1px;">
       <h1><span id="cart"></span>cart value <span id="cartvalue"></span></h1>
        </div>
    </div>
    <script>
        let cart = 0
        function showcart(){
            var value = document.getElementById('cartvalue')
            value.innerHTML= cart   
        }
        function addtocart(){
            cart += 1
            document.getElementById('cartvalue').innerHTML= cart
        }
        function addtocarttwo(){
            cart += 2
            document.getElementById('cartvalue').innerHTML= cart
        }
         function addtocartthree(){
            cart += 3
            document.getElementById('cartvalue').innerHTML= cart
        }
        function resetcart(){
            cart = 0
            document.getElementById('cartvalue').innerHTML= + cart
            alert("cart reset")
           
        }

    </script>


</body>
</html>
